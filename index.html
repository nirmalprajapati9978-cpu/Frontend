<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
    <title>Login page</title>
  </head>
  <body>
    <div class="container" id="a">
      <div class="card" id="b">
        <div class="login side">
          <h1>Login</h1>
          <input id="int1" placeholder="Enter username">
          <br>
          <input id="int2" type="password" placeholder="Enter password">
          <br>
          <button id="login" type="button">Login</button>
          <p id="l">Don't have an account? <span onclick="sig()" id="kax">Sign up</span></p>
        </div>
        <div class="sign side">
          <h1>Sign Up</h1>
          <input id="int3" placeholder="Set username">
          <br>
          <input type="password" id="int4" placeholder="Set password">
          <br>
          <button id="sign" type="button">Sign Up</button>
          <p id="s">Already have an account? <span onclick="sig()" id="nir">Login</span></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
